server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  # jpa:
  #   hibernate:
  #     ddl-auto: update
  
  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL}
      ssl:
        enabled: true

  jwt:
    secret: ${SPRING_JWT_SECRET}

logging:
  level:
    root: WARN
    org.springframework.data.redis: WARN

app:
  timezone: ${APP_TIMEZONE:Asia/Kolkata}
  redis:
    pubsub-enabled: ${APP_REDIS_PUBSUB_ENABLED:false}

springdoc:
  api-docs:
    path: /api/apidocs
  swagger-ui:
    path: /swagger-ui.html
