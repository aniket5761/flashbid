
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: flashbid
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d flashbid"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/flashbid
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_JWT_SECRET: "thisisthesecretkeythisisthesecretkeythisisthesecretkey"
      APP_TIMEZONE: Asia/Kolkata
      TZ: Asia/Kolkata
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Kolkata

volumes:
  postgres_data:
  redis_data: